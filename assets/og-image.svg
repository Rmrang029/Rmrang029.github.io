<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background: ink black -->
  <rect width="1200" height="630" fill="#0F0F12"/>

  <!-- Brass top rule -->
  <rect x="80" y="80" width="240" height="4" fill="#B08D3C"/>

  <!-- Eyebrow -->
  <text x="80" y="120"
        font-family="'Oswald', 'Arial Narrow', sans-serif"
        font-weight="500"
        font-size="22"
        letter-spacing="6"
        fill="#B08D3C">NOVELIST  /  AUTHOR.COLLINVANESS.COM</text>

  <!-- Author name (huge) -->
  <text x="80" y="320"
        font-family="'Oswald', 'Arial Narrow', sans-serif"
        font-weight="700"
        font-size="180"
        letter-spacing="2"
        fill="#F4F0E8">COLLIN VANESS</text>

  <!-- Oxblood underline -->
  <rect x="80" y="345" width="1040" height="8" fill="#7A1F1F"/>

  <!-- Tagline -->
  <text x="80" y="430"
        font-family="'Playfair Display', Georgia, serif"
        font-style="italic"
        font-size="44"
        fill="#F4F0E8">Novelist. Range across time.</text>

  <!-- Series strip -->
  <text x="80" y="540"
        font-family="'Source Sans 3', 'Helvetica Neue', sans-serif"
        font-weight="400"
        font-size="22"
        fill="#C9C2B3">Military thriller  ·  Science fiction  ·  Historical  ·  Prehistoric epic</text>

  <!-- Short mark, top right -->
  <g transform="translate(1000, 60)">
    <rect width="140" height="140" fill="#F4F0E8"/>
    <rect x="15" y="-7" width="16" height="168" fill="#7A1F1F" transform="rotate(18 70 70)"/>
    <text x="68" y="104"
          font-family="'Oswald', 'Arial Narrow', sans-serif"
          font-weight="700"
          font-size="112"
          fill="#0F0F12">V</text>
  </g>
</svg>
