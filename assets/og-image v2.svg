<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Collin Vaness Author Banner</title>
  <desc id="desc">Dark minimalist author branding banner with Collin Vaness wordmark, gold author descriptor, red rule, tagline, genre line, and CV monogram.</desc>

  <defs>
    <style>
      .bg { fill: #0d0f14; }
      .bg-vignette { fill: url(#vignette); }
      .gold { fill: #a98b36; }
      .gold-stroke { stroke: #a98b36; }
      .red { fill: #9a1f1f; }
      .red-stroke { stroke: #9a1f1f; }
      .ivory { fill: #f4efe5; }
      .soft { fill: #c8c1b5; }
      .main-name {
        font-family: "Montserrat", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
        font-size: 162px;
        font-weight: 700;
        letter-spacing: 34px;
      }
      .topline {
        font-family: "Montserrat", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
        font-size: 34px;
        font-weight: 400;
        letter-spacing: 28px;
      }
      .tagline {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 55px;
        font-style: italic;
        font-weight: 300;
      }
      .genres {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 30px;
        font-weight: 300;
        letter-spacing: 0.5px;
      }
      .mono-c {
        font-family: "Georgia", "Times New Roman", serif;
        font-size: 112px;
        font-weight: 400;
      }
      .mono-v {
        font-family: "Georgia", "Times New Roman", serif;
        font-size: 116px;
        font-weight: 400;
      }
    </style>
    <radialGradient id="vignette" cx="50%" cy="48%" r="75%">
      <stop offset="0%" stop-color="#141821" stop-opacity="0.55"/>
      <stop offset="58%" stop-color="#0d0f14" stop-opacity="0"/>
      <stop offset="100%" stop-color="#07080b" stop-opacity="0.72"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect class="bg" x="0" y="0" width="1600" height="900"/>
  <rect class="bg-vignette" x="0" y="0" width="1600" height="900"/>

  <!-- top gold accent -->
  <line x1="106" y1="152" x2="438" y2="152" class="gold-stroke" stroke-width="5" stroke-linecap="square"/>

  <!-- top descriptor -->
  <text x="106" y="214" class="gold topline">NOVELIST / AUTHOR</text>

  <!-- restrained monogram -->
  <line x1="1420" y1="125" x2="1420" y2="249" class="red-stroke" stroke-width="4"/>
  <text x="1448" y="190" class="ivory mono-c">C</text>
  <text x="1496" y="244" class="ivory mono-v">V</text>

  <!-- main wordmark -->
  <text x="106" y="474" class="ivory main-name">COLLIN VANESS</text>

  <!-- red rule -->
  <rect x="106" y="520" width="1388" height="7" class="red"/>

  <!-- tagline -->
  <text x="106" y="625" class="ivory tagline">Novelist. Range across time.</text>

  <!-- genre line -->
  <text x="106" y="750" class="soft genres">Military thriller · Science fiction · Historical · Prehistoric epic</text>
</svg>
