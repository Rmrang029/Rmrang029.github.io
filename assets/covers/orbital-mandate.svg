<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" role="img" aria-label="The First Doubt — Book One of The Orbital Mandate">
  <title>The Orbital Mandate — Book One</title>
  <rect width="600" height="900" fill="#0F0F12"/>
  <!-- Concentric orbit motif -->
  <circle cx="300" cy="430" r="240" fill="none" stroke="#D4B36A" stroke-width="2"/>
  <circle cx="300" cy="430" r="170" fill="none" stroke="#D4B36A" stroke-width="1"/>
  <circle cx="300" cy="430" r="100" fill="none" stroke="#D4B36A" stroke-width="1"/>
  <circle cx="300" cy="430" r="6" fill="#D4B36A"/>
  <text x="40" y="80"
        font-family="'Oswald', 'Arial Narrow', sans-serif"
        font-weight="500" font-size="22" letter-spacing="8" fill="#D4B36A">BOOK ONE</text>
  <text x="40" y="140"
        font-family="'Oswald', 'Arial Narrow', sans-serif"
        font-weight="700" font-size="32" letter-spacing="2" fill="#F4F0E8">THE ORBITAL MANDATE</text>
  <text x="40" y="730"
        font-family="'Oswald', 'Arial Narrow', sans-serif"
        font-weight="700" font-size="88" letter-spacing="2" fill="#D4B36A">THE FIRST</text>
  <text x="40" y="800"
        font-family="'Oswald', 'Arial Narrow', sans-serif"
        font-weight="700" font-size="88" letter-spacing="2" fill="#F4F0E8">DOUBT</text>
  <rect x="0" y="820" width="600" height="80" fill="#D4B36A"/>
  <text x="40" y="872"
        font-family="'Oswald', 'Arial Narrow', sans-serif"
        font-weight="700" font-size="36" letter-spacing="4" fill="#0F0F12">COLLIN VANESS</text>
</svg>
