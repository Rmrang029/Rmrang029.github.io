<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" role="img" aria-label="Vox Awakens — Book One of The Iron Revenants Saga">
  <title>The Iron Revenants Saga — Book One</title>
  <rect width="600" height="900" fill="#0F0F12"/>
  <rect x="0" y="0" width="600" height="80" fill="#7A1F1F"/>
  <rect x="0" y="80" width="600" height="40" fill="#B08D3C"/>
  <text x="40" y="50"
